[module/brightness-control]
type = custom/script
exec = ~/.config/polybar/forest/scripts/brightness.sh get
interval = 1
tail = true
format = <label>
format-prefix = "%{T1}"
label = %output%
scroll-up = ~/.config/polybar/forest/scripts/brightness.sh inc
scroll-down = ~/.config/polybar/forest/scripts/brightness.sh dec
cursor-scroll = ns-resize

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/brightness1-control]
type = custom/script
exec = ~/.config/polybar/forest/scripts/brightness1.sh get
interval = 1
tail = true
format = <label>
format-prefix = "%{T1}"
label = %output%
scroll-up = ~/.config/polybar/forest/scripts/brightness1.sh inc
scroll-down = ~/.config/polybar/forest/scripts/brightness1.sh dec
cursor-scroll = ns-resize

